<svg width="1400" height="760" viewBox="0 0 1400 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1320" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3F7FF"/>
      <stop offset="0.48" stop-color="#FFF9ED"/>
      <stop offset="1" stop-color="#EEF8F1"/>
    </linearGradient>
    <linearGradient id="panelA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D9E8FF"/>
      <stop offset="1" stop-color="#F7FBFF"/>
    </linearGradient>
    <linearGradient id="panelB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFE7BE"/>
      <stop offset="1" stop-color="#FFF8EC"/>
    </linearGradient>
    <linearGradient id="panelC" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D7F2DD"/>
      <stop offset="1" stop-color="#F3FCF5"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1400" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#355070" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="1352" height="712" rx="36" fill="url(#bg)"/>
  <circle cx="143" cy="126" r="56" fill="#D9E8FF"/>
  <circle cx="1240" cy="128" r="72" fill="#FFE7BE"/>
  <circle cx="1283" cy="604" r="54" fill="#D7F2DD"/>
  <circle cx="179" cy="636" r="40" fill="#FFF1CC"/>

  <text x="88" y="112" fill="#1C274C" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">
    RealRestorer
  </text>
  <text x="88" y="154" fill="#4C5C7A" font-family="Arial, Helvetica, sans-serif" font-size="24">
    Generalizable real-world image restoration with a large-scale image editing backbone
  </text>

  <g filter="url(#shadow)">
    <rect x="78" y="216" width="370" height="368" rx="28" fill="url(#panelA)"/>
    <rect x="515" y="216" width="370" height="368" rx="28" fill="url(#panelB)"/>
    <rect x="952" y="216" width="370" height="368" rx="28" fill="url(#panelC)"/>
  </g>

  <text x="112" y="276" fill="#1C274C" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">
    01. Degradation Pipeline
  </text>
  <text x="549" y="276" fill="#553A10" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">
    02. RealRestorer Pipeline
  </text>
  <text x="986" y="276" fill="#17452A" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">
    03. RealIR-Bench
  </text>

  <text x="112" y="334" fill="#355070" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Synthesize real degradations
  </text>
  <text x="112" y="372" fill="#4C5C7A" font-family="Arial, Helvetica, sans-serif" font-size="21">
