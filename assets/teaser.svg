  </text>
  <text x="112" y="528" fill="#1C274C" font-family="Courier New, monospace" font-size="18">
    python3 infer_degradation.py ...
  </text>

  <text x="549" y="334" fill="#8E5A00" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Restore details and structure
  </text>
  <text x="549" y="372" fill="#6B5533" font-family="Arial, Helvetica, sans-serif" font-size="21">
