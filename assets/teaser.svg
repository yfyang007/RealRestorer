  </text>
  <text x="549" y="528" fill="#553A10" font-family="Courier New, monospace" font-size="18">
    python3 infer_realrestorer.py ...
  </text>

  <text x="986" y="334" fill="#1C6B3D" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
