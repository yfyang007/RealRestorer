  </text>

  <path d="M448 402H495" stroke="#7B8FB2" stroke-width="6" stroke-linecap="round"/>
  <path d="M488 386L512 402L488 418" stroke="#7B8FB2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M885 402H932" stroke="#8BAA94" stroke-width="6" stroke-linecap="round"/>
  <path d="M925 386L949 402L925 418" stroke="#8BAA94" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="88" y="628" width="1224" height="64" rx="18" fill="#FFFFFF" fill-opacity="0.75"/>
  <text x="124" y="668" fill="#2A395A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
